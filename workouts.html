<!DOCTYPE html>
<html lang="en">
 <head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>
   FitTrack - Workouts
  </title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="style.css" rel="stylesheet"/>
 </head>
 <body class="dark">
  <nav class="navbar navbar-expand-lg app-navbar">
   <a class="logo navbar-brand" href="dashboard.html">
    FIT
    <span>
     TRACK
    </span>
   </a>
   <button aria-controls="fitNav" aria-expanded="false" aria-label="Toggle navigation" class="navbar-toggler app-toggler" data-bs-target="#fitNav" data-bs-toggle="collapse" type="button">
    <span class="navbar-toggler-icon">
    </span>
   </button>
   <div class="collapse navbar-collapse" id="fitNav">
    <ul class="navbar-nav nav-links mx-auto mb-2 mb-lg-0">
     <li class="nav-item">
      <a class="nav-link" href="dashboard.html">
       Dashboard
      </a>
     </li>
     <li class="nav-item">
      <a class="nav-link active" href="workouts.html">
       Workouts
      </a>
     </li>
     <li class="nav-item">
      <a class="nav-link" href="goals.html">
       Goals
      </a>
     </li>
     <li class="nav-item">
      <a class="nav-link" href="diet.html">
       Diet Plan
      </a>
     </li>
     <li class="nav-item">
      <a class="nav-link" href="trainers.html">
       Trainers
      </a>
     </li>
     <li class="nav-item">
      <a class="nav-link" href="reviews.html">
       Reviews
      </a>
     </li>
     <li class="nav-item">
      <a class="nav-link" href="community.html">
       Community
      </a>
     </li>
    </ul>
    <div class="nav-right d-flex align-items-center gap-2 flex-wrap">
     <span class="nav-user d-none d-xl-inline">
      Hi,
      <strong id="navName">
      </strong>
     </span>
     <div class="toggle-wrap">
      <label>
       Light
      </label>
      <label class="switch">
       <input class="theme-checkbox" type="checkbox"/>
       <span class="slider">
       </span>
      </label>
     </div>
     <button class="btn btn-outline btn-sm" id="logoutBtn">
      Logout
     </button>
    </div>
   </div>
  </nav>
  <div class="container">
   <div class="workouts-bar">
    <div>
     <h2>
      My Workouts
     </h2>
     <p id="count">
      Loading...
     </p>
    </div>
    <button class="btn btn-red" id="addBtn">
     + Add Workout
    </button>
   </div>
   <!-- filters -->
   <div class="filters">
    <input class="search-input" id="searchBox" placeholder="Search workouts..." type="text"/>
    <select id="filterType">
     <option value="">
      All Types
     </option>
     <option value="Cardio">
      Cardio
     </option>
     <option value="HIIT">
      HIIT
     </option>
     <option value="Yoga">
      Yoga
     </option>
     <option value="Pilates">
      Pilates
     </option>
    </select>
    <input id="filterDate" title="Filter by date" type="date"/>
    <button class="btn btn-outline btn-sm" id="clearDate">
     Clear Date
    </button>
    <select id="sortBy">
     <option value="">
      Newest First
     </option>
     <option value="oldest">
      Oldest First
     </option>
     <option value="cal_high">
      Calories: High to Low
     </option>
     <option value="cal_low">
      Calories: Low to High
     </option>
     <option value="dur_high">
      Duration: High to Low
     </option>
     <option value="dur_low">
      Duration: Low to High
     </option>
    </select>
   </div>
   <!-- cards -->
   <div class="cards-grid" id="cardsGrid">
   </div>
  </div>
  <!-- add workout modal -->
  <div class="overlay" id="modal">
   <div class="modal-box">
    <div class="modal-top">
     <h3>
      Add Workout
     </h3>
     <button class="close-btn" id="modalClose">
      X
     </button>
    </div>
    <form id="workoutForm">
     <div class="form-group">
      <label for="wName">
       Workout Name
      </label>
      <input id="wName" placeholder="e.g. Morning Run" type="text"/>
      <div class="error-msg" id="wNameErr">
      </div>
     </div>
     <div class="form-group">
      <label for="wType">
       Type
      </label>
      <select id="wType">
       <option value="">
        Select type...
       </option>
       <option value="Cardio">
        Cardio
       </option>
       <option value="HIIT">
        HIIT
       </option>
       <option value="Yoga">
        Yoga
       </option>
       <option value="Pilates">
        Pilates
       </option>
      </select>
      <div class="error-msg" id="wTypeErr">
      </div>
     </div>
     <div class="form-group">
      <label for="wDuration">
       Duration (minutes)
      </label>
      <input id="wDuration" min="1" placeholder="e.g. 30" type="number"/>
      <div class="error-msg" id="wDurErr">
      </div>
     </div>
     <div class="form-group">
      <label for="wCalories">
       Calories Burned
      </label>
      <input id="wCalories" min="1" placeholder="e.g. 300" type="number"/>
      <div class="error-msg" id="wCalErr">
      </div>
     </div>
     <div class="form-group">
      <label for="wDate">
       Date
      </label>
      <input id="wDate" type="date"/>
      <div class="error-msg" id="wDateErr">
      </div>
     </div>
     <div>
      <button class="btn btn-red" type="submit">
       Save
      </button>
      <button class="btn btn-outline" id="cancelBtn" type="button">
       Cancel
      </button>
     </div>
    </form>
   </div>
  </div>
  <div class="toast-wrap">
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
  </script>
  <script src="auth.js">
  </script>
  <script src="workouts.js">
  </script>
 </body>
</html>
