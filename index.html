<!DOCTYPE html>
<html lang="en">
 <head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>
   FitTrack - Login
  </title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="css/style.css" rel="stylesheet"/>
 </head>
 <body class="dark">
  <div class="auth-theme-btn">
   <span>
    Light
   </span>
   <label class="switch">
    <input class="theme-checkbox" type="checkbox"/>
    <span class="slider">
    </span>
   </label>
  </div>
  <div class="auth-wrapper">
   <div class="auth-box">
    <div class="logo-big">
     <h1>
      FIT
      <span>
       TRACK
      </span>
     </h1>
     <p>
      Welcome back
     </p>
    </div>
    <h2>
     Login
    </h2>
    <form id="loginForm">
     <div class="form-group">
      <label for="email">
       Email
      </label>
      <input id="email" placeholder="you@example.com" required="" type="email"/>
      <div class="error-msg" id="emailErr">
      </div>
     </div>
     <div class="form-group">
      <label for="password">
       Password
      </label>
      <input id="password" placeholder="Your password" required="" type="password"/>
      <div class="error-msg" id="passErr">
      </div>
     </div>
     <button class="btn btn-red btn-full" type="submit">
      Login
     </button>
    </form>
    <p class="bottom-link">
     Don't have an account?
     <a href="register.html">
      Register here
     </a>
    </p>
   </div>
  </div>
  <div class="toast-wrap">
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
  </script>
  <script src="js/auth.js">
  </script>
  <script>
   // Initialize theme and login logic specifically
    initTheme();
    initLogin();
  </script>
 </body>
</html>
