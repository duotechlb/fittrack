<!DOCTYPE html>
<html lang="en">
 <head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>
   FitTrack - Register
  </title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="css/style.css" rel="stylesheet"/>
 </head>
 <body class="dark">
  <!-- theme toggle -->
  <div class="auth-theme-btn">
   <span>
    Light
   </span>
   <label class="switch">
    <input class="theme-checkbox" type="checkbox"/>
    <span class="slider">
    </span>
   </label>
  </div>
  <div class="auth-wrapper">
   <div class="auth-box">
    <div class="logo-big">
     <h1>
      FIT
      <span>
       TRACK
      </span>
     </h1>
     <p>
      Create your account
     </p>
    </div>
    <h2>
     Register
    </h2>
    <form id="registerForm">
     <div class="form-group">
      <label for="name">
       Full Name
      </label>
      <input id="name" placeholder="John Doe" type="text"/>
      <div class="error-msg" id="nameErr">
      </div>
     </div>
     <div class="form-group">
      <label for="email">
       Email
      </label>
      <input id="email" placeholder="you@example.com" type="email"/>
      <div class="error-msg" id="emailErr">
      </div>
     </div>
     <div class="form-group">
      <label for="password">
       Password
      </label>
      <input id="password" placeholder="Min 8 chars, upper, lower, number, symbol" type="password"/>
      <div class="error-msg" id="passErr">
      </div>
     </div>
     <div class="form-group">
      <label for="confirmPass">
       Confirm Password
      </label>
      <input id="confirmPass" placeholder="Repeat your password" type="password"/>
      <div class="error-msg" id="confirmErr">
      </div>
     </div>
     <button class="btn btn-red btn-full" type="submit">
      Create Account
     </button>
    </form>
    <p class="bottom-link">
     Already have an account?
     <a href="index.html">
      Login
     </a>
    </p>
   </div>
  </div>
  <div class="toast-wrap">
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
  </script>
  <script src="js/auth.js">
  </script>
  <script>
   initTheme();
    initRegister();
  </script>
 </body>
</html>
